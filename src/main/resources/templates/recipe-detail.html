<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${recipe.title} + ' - Recipe Recommender'">Recipe Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4" style="max-width: 720px;">

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card">
        <div class="card-body p-4">

            <h2 class="card-title mb-3" th:text="${recipe.title}"></h2>

            <!-- Difficulty badge -->
            <div class="mb-3">
                <span class="text-muted me-2">Difficulty:</span>
                <span th:text="${recipe.difficulty}"
                      th:class="${recipe.difficulty == 'Beginner'} ? 'badge bg-warning text-dark' : (${recipe.difficulty == 'Intermediate'} ? 'badge bg-primary' : 'badge bg-danger')">
                </span>
            </div>

            <!-- Cuisine types -->
            <div class="mb-3">
                <span class="text-muted me-2">Cuisine Types:</span>
                <span th:each="ct : ${recipe.cuisineTypes}"
                      class="badge bg-secondary me-1"
                      th:text="${ct}">
                </span>
            </div>

            <!-- Recipe ID -->
            <div class="mb-1">
                <span class="text-muted">Recipe ID:</span>
                <span class="text-muted ms-2" th:text="${recipe.id}"></span>
            </div>

        </div>
    </div>

    <div class="mt-3 d-flex gap-2">
        <a th:href="@{/recipes}" class="btn btn-outline-secondary">Back to All Recipes</a>
        <a th:href="@{/recipes/styled}" class="btn btn-outline-primary">View Styled List</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmF+sCFBJfYXdKRZo2u4cJfQNqor"
        crossorigin="anonymous"></script>
</body>
</html>
