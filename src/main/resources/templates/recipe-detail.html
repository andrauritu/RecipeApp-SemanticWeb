<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${recipe.title} + ' - Recipe Recommender'">Recipe Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4" style="max-width: 760px;">

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Main detail card with colored top border -->
    <div class="card shadow-sm mb-4"
         th:style="${recipe.difficulty == 'Beginner'} ? 'border-top: 4px solid #198754' : (${recipe.difficulty == 'Intermediate'} ? 'border-top: 4px solid #0d6efd' : 'border-top: 4px solid #dc3545')">
        <div class="card-body p-4">

            <h2 class="card-title mb-3" th:text="${recipe.title}"></h2>

            <!-- Difficulty -->
            <div class="mb-3">
                <span class="text-muted me-2">Difficulty:</span>
                <span th:text="${recipe.difficulty}"
                      th:class="${recipe.difficulty == 'Beginner'} ? 'badge bg-success fs-6' : (${recipe.difficulty == 'Intermediate'} ? 'badge bg-primary fs-6' : 'badge bg-danger fs-6')">
                </span>
            </div>

            <!-- Cuisine types -->
            <div class="mb-3">
                <span class="text-muted me-2">Cuisine Types:</span>
                <span th:each="ct : ${recipe.cuisineTypes}"
                      class="badge bg-secondary badge-cuisine me-1"
                      th:text="${ct}">
                </span>
            </div>

            <!-- Recipe ID -->
            <div>
                <span class="text-muted small">Recipe ID: </span>
                <span class="text-muted small" th:text="${recipe.id}"></span>
            </div>

        </div>
    </div>

    <!-- Action buttons -->
    <div class="d-flex gap-2 mb-5">
        <a th:href="@{/recipes}" class="btn btn-outline-secondary">Back to All Recipes</a>
        <a th:href="@{/recipes/styled}" class="btn btn-outline-primary">View Styled List</a>
    </div>

    <!-- Also recommended section -->
    <div th:if="${!#lists.isEmpty(similarRecipes)}">
        <h4 class="mb-3">Also recommended for you</h4>
        <div class="row row-cols-1 row-cols-md-3 g-3 mb-4">
            <div th:each="similar : ${similarRecipes}" class="col">
                <div class="card h-100 recipe-card border-0 shadow-sm">
                    <div class="card-body">
                        <h6 class="card-title" th:text="${similar.title}"></h6>
                        <div class="mb-1">
                            <span th:each="ct : ${similar.cuisineTypes}"
                                  class="badge bg-secondary badge-cuisine me-1"
                                  th:text="${ct}">
                            </span>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent border-0 pb-2">
                        <a th:href="@{/recipes/{id}(id=${similar.id})}" class="btn btn-sm btn-outline-primary w-100">
                            View Details
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/navbar :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmF+sCFBJfYXdKRZo2u4cJfQNqor"
        crossorigin="anonymous"></script>
</body>
</html>
