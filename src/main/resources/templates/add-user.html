<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User - Recipe Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4" style="max-width: 640px;">
    <h1 class="mb-4">Add New User</h1>

    <form th:action="@{/users/add}" method="post" novalidate>

        <!-- Name -->
        <div class="mb-3">
            <label for="name" class="form-label fw-semibold">Name</label>
            <input type="text" id="name" name="name"
                   th:class="${nameError != null} ? 'form-control is-invalid' : 'form-control'"
                   th:value="${inputName}" placeholder="Enter first name">
            <div th:if="${nameError != null}" class="text-danger small mt-1" th:text="${nameError}"></div>
        </div>

        <!-- Surname -->
        <div class="mb-3">
            <label for="surname" class="form-label fw-semibold">Surname</label>
            <input type="text" id="surname" name="surname"
                   th:class="${surnameError != null} ? 'form-control is-invalid' : 'form-control'"
                   th:value="${inputSurname}" placeholder="Enter surname">
            <div th:if="${surnameError != null}" class="text-danger small mt-1" th:text="${surnameError}"></div>
        </div>

        <!-- Cooking Skill Level -->
        <div class="mb-3">
            <label for="skillLevel" class="form-label fw-semibold">Cooking Skill Level</label>
            <select id="skillLevel" name="skillLevel"
                    th:class="${skillLevelError != null} ? 'form-select is-invalid' : 'form-select'">
                <option value="">-- Select skill level --</option>
                <option th:each="level : ${skillLevels}"
                        th:value="${level}"
                        th:text="${level}"
                        th:selected="${level == inputSkillLevel}">
                </option>
            </select>
            <div th:if="${skillLevelError != null}" class="text-danger small mt-1" th:text="${skillLevelError}"></div>
        </div>

        <!-- Preferred Cuisine Type -->
        <div class="mb-4">
            <label for="cuisineType" class="form-label fw-semibold">Preferred Cuisine Type</label>
            <select id="cuisineType" name="cuisineType"
                    th:class="${cuisineTypeError != null} ? 'form-select is-invalid' : 'form-select'">
                <option value="">-- Select cuisine type --</option>
                <option th:each="ct : ${cuisineTypes}"
                        th:value="${ct}"
                        th:text="${ct}"
                        th:selected="${ct == inputCuisineType}">
                </option>
            </select>
            <div th:if="${cuisineTypeError != null}" class="text-danger small mt-1" th:text="${cuisineTypeError}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Add User</button>
        <a th:href="@{/users}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmF+sCFBJfYXdKRZo2u4cJfQNqor"
        crossorigin="anonymous"></script>
</body>
</html>
