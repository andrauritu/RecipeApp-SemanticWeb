<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendations - Recipe Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h1 class="mb-4">Recipe Recommendations</h1>

    <!-- User profile card -->
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title"
                th:text="'Recommending for: ' + ${user.name} + ' ' + ${user.surname}">
            </h5>
            <div class="row mt-2">
                <div class="col-sm-6">
                    <span class="text-muted">Cooking Skill Level:</span>
                    <span class="ms-2 fw-semibold" th:text="${user.cookingSkillLevel}"></span>
                </div>
                <div class="col-sm-6">
                    <span class="text-muted">Preferred Cuisine:</span>
                    <span class="ms-2 fw-semibold" th:text="${user.preferredCuisineType}"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Tab buttons -->
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a class="nav-link active" th:href="@{/recommendations}">By Skill Level</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/recommendations/advanced}">By Skill + Cuisine</a>
        </li>
    </ul>

    <!-- Results -->
    <div th:if="${#lists.isEmpty(recipes)}">
        <div class="alert alert-warning" role="alert">
            No recipes found matching your profile.
        </div>
    </div>

    <div th:if="${!#lists.isEmpty(recipes)}">
        <p class="text-muted"
           th:text="'Found ' + ${#lists.size(recipes)} + ' recipes matching your skill level: ' + ${user.cookingSkillLevel}">
        </p>

        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th scope="col">Title</th>
                <th scope="col">Cuisine Types</th>
                <th scope="col">Difficulty</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="recipe : ${recipes}">
                <td th:text="${recipe.title}"></td>
                <td th:text="${#strings.listJoin(recipe.cuisineTypes, ', ')}"></td>
                <td>
                    <span th:text="${recipe.difficulty}"
                          th:class="${recipe.difficulty == 'Beginner'} ? 'badge bg-success' : (${recipe.difficulty == 'Intermediate'} ? 'badge bg-warning text-dark' : 'badge bg-danger')">
                    </span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmF+sCFBJfYXdKRZo2u4cJfQNqor"
        crossorigin="anonymous"></script>
</body>
</html>
