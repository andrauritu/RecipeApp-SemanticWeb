<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendations - Recipe Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h1 class="mb-4">Recipe Recommendations</h1>

    <!-- User selector -->
    <div class="card mb-3">
        <div class="card-body">
            <div class="row align-items-center">
                <div class="col-auto">
                    <label for="userSelect" class="col-form-label fw-semibold">Select User:</label>
                </div>
                <div class="col-sm-4">
                    <select id="userSelect" class="form-select"
                            th:data-advanced="${matchType == 'advanced'}"
                            onchange="window.location.href=(this.dataset.advanced==='true'?'/recommendations/advanced':'/recommendations')+'?userId='+this.value">
                        <option th:each="u : ${users}"
                                th:value="${u.id}"
                                th:text="${u.name + ' ' + u.surname}"
                                th:selected="${u.id == selectedUserId}">
                        </option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- User profile card -->
    <div class="card mb-4 bg-info bg-opacity-10 border border-info">
        <div class="card-body">
            <div class="d-flex align-items-center mb-3">
                <div class="avatar-circle me-3"
                     th:text="${#strings.substring(user.name,0,1) + #strings.substring(user.surname,0,1)}">
                </div>
                <h5 class="mb-0"
                    th:text="'Recommending for: ' + ${user.name} + ' ' + ${user.surname}">
                </h5>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <span class="text-muted">Cooking Skill Level:</span>
                    <span class="ms-2 fw-semibold" th:text="${user.cookingSkillLevel}"></span>
                </div>
                <div class="col-sm-6">
                    <span class="text-muted">Preferred Cuisine:</span>
                    <span class="ms-2 fw-semibold" th:text="${user.preferredCuisineType}"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Pills tabs -->
    <ul class="nav nav-pills mb-4">
        <li class="nav-item">
            <a th:href="@{/recommendations(userId=${selectedUserId})}"
               th:class="${matchType == 'skill'} ? 'nav-link active' : 'nav-link'">
                By Skill Level
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/recommendations/advanced(userId=${selectedUserId})}"
               th:class="${matchType == 'advanced'} ? 'nav-link active' : 'nav-link'">
                By Skill + Cuisine
            </a>
        </li>
    </ul>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(recipes)}">
        <div class="alert alert-warning" role="alert">
            <span th:if="${matchType == 'skill'}">No recipes found matching your profile.</span>
            <span th:if="${matchType == 'advanced'}">No recipes found matching both your skill level and preferred cuisine type.</span>
        </div>
    </div>

    <!-- Results -->
    <div th:if="${!#lists.isEmpty(recipes)}">
        <p class="text-muted">
            <span th:if="${matchType == 'skill'}"
                  th:text="'Found ' + ${#lists.size(recipes)} + ' recipes matching your skill level: ' + ${user.cookingSkillLevel}">
            </span>
            <span th:if="${matchType == 'advanced'}"
                  th:text="'Found ' + ${#lists.size(recipes)} + ' recipes matching your skill level: ' + ${user.cookingSkillLevel} + ' and cuisine: ' + ${user.preferredCuisineType}">
            </span>
        </p>

        <div class="row row-cols-1 row-cols-md-3 g-4 mb-4">
            <div th:each="recipe : ${recipes}" class="col">
                <div class="card h-100 recipe-card border-0 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${recipe.title}"></h5>
                        <div class="mb-2">
                            <span th:each="ct : ${recipe.cuisineTypes}"
                                  class="badge bg-secondary badge-cuisine me-1"
                                  th:text="${ct}">
                            </span>
                        </div>
                        <span th:text="${recipe.difficulty}"
                              th:class="${recipe.difficulty == 'Beginner'} ? 'badge bg-success' : (${recipe.difficulty == 'Intermediate'} ? 'badge bg-warning text-dark' : 'badge bg-danger')">
                        </span>
                    </div>
                    <div class="card-footer bg-transparent border-0 pb-3">
                        <a th:href="@{/recipes/{id}(id=${recipe.id})}" class="btn btn-sm btn-primary w-100">
                            View Details
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/navbar :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmF+sCFBJfYXdKRZo2u4cJfQNqor"
        crossorigin="anonymous"></script>
</body>
</html>
