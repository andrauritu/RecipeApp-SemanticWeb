<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Recipe Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5" style="max-width: 760px;">
    <div class="alert alert-danger">
        <h4 class="alert-heading">An error occurred</h4>
        <hr>
        <p><strong>URL:</strong> <span th:text="${requestUri}"></span></p>
        <p><strong>Type:</strong> <span th:text="${errorType}"></span></p>
        <p class="mb-0"><strong>Message:</strong> <span th:text="${errorMessage}"></span></p>
    </div>
    <a th:href="@{/recipes}" class="btn btn-outline-secondary">Back to Recipes</a>
</div>

</body>
</html>
