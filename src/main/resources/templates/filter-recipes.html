<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter Recipes - Recipe Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h1 class="mb-4">Filter Recipes by Cuisine Type</h1>

    <!-- Cuisine filter buttons -->
    <div class="d-flex flex-wrap gap-2 mb-4">
        <a th:href="@{/recipes/filter}"
           th:class="${selectedCuisine == ''} ? 'btn btn-primary' : 'btn btn-outline-primary'">
            All
        </a>
        <a th:each="ct : ${cuisineTypes}"
           th:href="@{/recipes/filter(cuisine=${ct})}"
           th:text="${ct}"
           th:class="${ct == selectedCuisine} ? 'btn btn-primary' : 'btn btn-outline-primary'">
        </a>
    </div>

    <!-- Count message -->
    <p class="text-muted">
        <span th:if="${selectedCuisine == ''}"
              th:text="'Showing all ' + ${#lists.size(recipes)} + ' recipes'">
        </span>
        <span th:if="${selectedCuisine != ''}"
              th:text="'Showing ' + ${#lists.size(recipes)} + ' recipes with ' + ${selectedCuisine} + ' cuisine'">
        </span>
    </p>

    <!-- No results -->
    <div th:if="${selectedCuisine != '' and #lists.isEmpty(recipes)}"
         class="alert alert-warning" role="alert"
         th:text="'No recipes found for ' + ${selectedCuisine} + ' cuisine.'">
    </div>

    <!-- Results table -->
    <table th:if="${!#lists.isEmpty(recipes)}"
           class="table table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th scope="col">Title</th>
            <th scope="col">Cuisine Types</th>
            <th scope="col">Difficulty</th>
            <th scope="col">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="recipe : ${recipes}">
            <td th:text="${recipe.title}"></td>
            <td th:text="${#strings.listJoin(recipe.cuisineTypes, ', ')}"></td>
            <td>
                <span th:text="${recipe.difficulty}"
                      th:class="${recipe.difficulty == 'Beginner'} ? 'badge bg-success' : (${recipe.difficulty == 'Intermediate'} ? 'badge bg-warning text-dark' : 'badge bg-danger')">
                </span>
            </td>
            <td>
                <a th:href="@{/recipes/{id}(id=${recipe.id})}" class="btn btn-sm btn-outline-primary">
                    View Details
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmF+sCFBJfYXdKRZo2u4cJfQNqor"
        crossorigin="anonymous"></script>
</body>
</html>
