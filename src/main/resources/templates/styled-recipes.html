<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Recipes - Recipe Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h1 class="mb-4">Styled Recipe View</h1>

    <!-- User selector card -->
    <div class="card mb-3">
        <div class="card-body">
            <div class="row align-items-center">
                <div class="col-auto">
                    <label for="userSelect" class="col-form-label fw-semibold">Select User:</label>
                </div>
                <div class="col-sm-4">
                    <select id="userSelect" class="form-select"
                            onchange="window.location.href='/recipes/styled?userId='+this.value">
                        <option th:each="user : ${users}"
                                th:value="${user.id}"
                                th:text="${user.name + ' ' + user.surname}"
                                th:selected="${user.id == selectedUserId}">
                        </option>
                    </select>
                </div>
                <div class="col-auto text-muted" th:if="${selectedUser != null}">
                    Showing recipes for skill level:
                    <strong th:text="${selectedUser.cookingSkillLevel}"></strong>
                </div>
            </div>
        </div>
    </div>

    <!-- Color legend -->
    <div class="d-flex gap-3 mb-3">
        <div class="d-flex align-items-center gap-2">
            <span class="legend-box" style="background-color:#fff3cd;"></span>
            <span>Matches your skill level</span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <span class="legend-box" style="background-color:#d1e7dd;"></span>
            <span>Other recipes</span>
        </div>
    </div>

    <!-- XSL-transformed table -->
    <div th:utext="${transformedHtml}"></div>
</div>

<div th:replace="~{fragments/navbar :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmF+sCFBJfYXdKRZo2u4cJfQNqor"
        crossorigin="anonymous"></script>
</body>
</html>
