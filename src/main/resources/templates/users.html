<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Recipe Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Users</h1>
        <a th:href="@{/users/add}" class="btn btn-primary">Add User</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <p class="text-muted" th:text="'Showing ' + ${#lists.size(users)} + ' users'"></p>

    <div class="row row-cols-1 row-cols-md-3 g-4 mb-4">
        <div th:each="user : ${users}" class="col">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-3">
                        <div class="avatar-circle me-3"
                             th:text="${#strings.substring(user.name,0,1) + #strings.substring(user.surname,0,1)}">
                        </div>
                        <h5 class="mb-0" th:text="${user.name + ' ' + user.surname}"></h5>
                    </div>
                    <div class="mb-2">
                        <span class="text-muted small">Skill:</span>
                        <span class="ms-1"
                              th:text="${user.cookingSkillLevel}"
                              th:class="${user.cookingSkillLevel == 'Beginner'} ? 'badge bg-success' : (${user.cookingSkillLevel == 'Intermediate'} ? 'badge bg-warning text-dark' : 'badge bg-danger')">
                        </span>
                    </div>
                    <div class="mb-2">
                        <span class="text-muted small">Preferred cuisine:</span>
                        <span class="badge bg-secondary ms-1" th:text="${user.preferredCuisineType}"></span>
                    </div>
                    <div>
                        <small class="text-muted" th:text="'ID: ' + ${user.id}"></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/navbar :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmF+sCFBJfYXdKRZo2u4cJfQNqor"
        crossorigin="anonymous"></script>
</body>
</html>
